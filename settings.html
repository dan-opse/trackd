<!DOCTYPE html>
<html lang="en" id="html-root">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trackd — Settings</title>
    <meta name="description" content="Customize your Trackd experience — theme color and display mode." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f0f13;
            --surface: #1a1a24;
            --surface-hover: #20202e;
            --border: #2a2a3a;
            --accent: #7c3aed;
            --accent-glow: rgba(124, 58, 237, 0.35);
            --accent-light: #a78bfa;
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --text-muted: #52525b;
            --danger: #f43f5e;
            --radius-card: 16px;
            --radius-input: 10px;
            --radius-btn: 12px;
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.4), 0 1px 4px rgba(0, 0, 0, 0.2);
            --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ── Light mode overrides ── */
        [data-mode="light"] {
            --bg: #f5f3ff;
            --surface: #ffffff;
            --surface-hover: #f0eeff;
            --border: #e0d9ff;
            --text-primary: #1a0050;
            --text-secondary: #6b6b80;
            --text-muted: #9b9bac;
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.08), 0 1px 4px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 16px 80px;
            background-image:
                radial-gradient(ellipse 60% 40% at 50% -10%, color-mix(in srgb, var(--accent) 18%, transparent) 0%, transparent 70%),
                radial-gradient(ellipse 40% 30% at 80% 80%, color-mix(in srgb, var(--accent) 8%, transparent) 0%, transparent 60%);
            background-attachment: fixed;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* ── Header ── */
        header {
            width: 100%;
            max-width: 560px;
            padding: 48px 0 28px;
        }

        .page-title {
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            color: var(--text-primary);
        }

        .page-subtitle {
            margin-top: 4px;
            font-size: 0.875rem;
            color: var(--accent-light);
            font-weight: 500;
        }

        /* ── Settings Card ── */
        main {
            width: 100%;
            max-width: 560px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .settings-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-card);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .settings-card-title {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        /* ── Setting Row ── */
        .setting-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
        }

        .setting-info {
            flex: 1;
        }

        .setting-label {
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .setting-description {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 3px;
            line-height: 1.5;
        }

        /* ── Toggle switch ── */
        .toggle-switch {
            position: relative;
            width: 48px;
            height: 27px;
            flex-shrink: 0;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
            position: absolute;
        }

        .toggle-track {
            position: absolute;
            inset: 0;
            background: var(--border);
            border-radius: 100px;
            transition: background var(--transition);
            cursor: pointer;
        }

        .toggle-track::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--text-secondary);
            top: 3.5px;
            left: 3.5px;
            transition: transform var(--transition), background var(--transition);
        }

        .toggle-switch input:checked+.toggle-track {
            background: var(--accent);
        }

        .toggle-switch input:checked+.toggle-track::after {
            transform: translateX(21px);
            background: #fff;
        }

        /* ── Color Picker ── */
        .color-picker-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .color-presets {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .color-preset {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2.5px solid transparent;
            cursor: pointer;
            transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
        }

        .color-preset:hover {
            transform: scale(1.12);
        }

        .color-preset.active {
            border-color: var(--text-primary);
            box-shadow: 0 0 0 2px var(--bg), 0 0 10px var(--accent-glow);
        }

        .color-custom-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 4px;
        }

        .color-custom-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        input[type="color"] {
            width: 40px;
            height: 40px;
            border: 2px solid var(--border);
            border-radius: 50%;
            padding: 0;
            background: transparent;
            cursor: pointer;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 2px;
        }

        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 50%;
        }

        input[type="color"]::-moz-color-swatch {
            border: none;
            border-radius: 50%;
        }

        input[type="color"]:hover {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        /* ── Preview Swatch ── */
        .theme-preview {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: var(--surface-hover);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 0.82rem;
            color: var(--text-secondary);
        }

        .preview-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 12px var(--accent-glow);
            flex-shrink: 0;
        }

        .preview-accent-bar {
            height: 6px;
            border-radius: 100px;
            background: var(--accent);
            flex: 1;
            opacity: 0.7;
        }

        /* ── Mode card ── */
        .mode-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .mode-card {
            padding: 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: border-color var(--transition), background var(--transition);
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        .mode-card:hover {
            border-color: var(--accent-light);
            background: var(--surface-hover);
        }

        .mode-card.active {
            border-color: var(--accent);
            background: rgba(124, 58, 237, 0.08);
        }

        .mode-icon {
            font-size: 1.8rem;
            line-height: 1;
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mode-icon svg {
            width: 28px;
            height: 28px;
            stroke: currentColor;
            stroke-width: 2.5;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .mode-name {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .mode-card.active .mode-name {
            color: var(--accent-light);
        }

        /* ── Save indicator ── */
        .save-strip {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.72rem;
            color: var(--text-muted);
            transition: opacity var(--transition);
            opacity: 0;
        }

        .save-strip.visible {
            opacity: 1;
        }

        .save-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #34d399;
        }

        /* ── Dock ── */
        #app-dock {
            position: fixed;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 150;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 12px 10px;
            background: rgba(26, 26, 36, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(124, 58, 237, 0.08);
        }

        .dock-item {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            text-decoration: none;
            transition: color var(--transition), background var(--transition), transform 200ms cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .dock-item:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.18);
        }

        .dock-item:active {
            transform: scale(0.98);
        }

        .dock-item.active {
            color: var(--accent-light);
            background: rgba(124, 58, 237, 0.18);
        }

        .dock-item svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            pointer-events: none;
        }

        .dock-separator {
            width: 22px;
            height: 1px;
            background: var(--border);
            margin: 2px 0;
            opacity: 0.5;
        }

        .dock-item::after {
            content: attr(data-label);
            position: absolute;
            left: calc(100% + 12px);
            top: 50%;
            transform: translateY(-50%) translateX(-4px);
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            white-space: nowrap;
            padding: 5px 10px;
            border-radius: 8px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 150ms ease, transform 150ms ease;
            z-index: 200;
        }

        .dock-item:hover::after {
            opacity: 1;
            transform: translateY(-50%) translateX(0);
        }

        @media (max-width: 680px) {
            #app-dock {
                display: none;
            }
        }
    </style>
</head>

<body>
    <header>
        <h1 class="page-title">Settings</h1>
        <p class="page-subtitle">Customize your Trackd experience</p>
    </header>

    <main>
        <!-- Display Mode -->
        <div class="settings-card">
            <div class="settings-card-title">Display Mode</div>
            <div class="mode-options">
                <button class="mode-card active" id="mode-dark" aria-label="Dark mode" title="Dark mode">
                    <span class="mode-icon">
                        <svg viewBox="0 0 24 24">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </span>
                    <span class="mode-name">Dark</span>
                </button>
                <button class="mode-card" id="mode-light" aria-label="Light mode" title="Light mode">
                    <span class="mode-icon">
                        <svg viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                    </span>
                    <span class="mode-name">Light</span>
                </button>
            </div>
        </div>

        <!-- Accent Color -->
        <div class="settings-card">
            <div class="settings-card-title">Accent Color</div>
            <div class="color-picker-wrapper">
                <!-- Preset swatches -->
                <div class="color-presets" id="color-presets">
                    <button class="color-preset" data-color="#7c3aed" style="background:#7c3aed"
                        title="Violet (default)" aria-label="Violet"></button>
                    <button class="color-preset" data-color="#0891b2" style="background:#0891b2" title="Teal"
                        aria-label="Teal"></button>
                    <button class="color-preset" data-color="#d97706" style="background:#d97706" title="Amber"
                        aria-label="Amber"></button>
                    <button class="color-preset" data-color="#e11d48" style="background:#e11d48" title="Rose"
                        aria-label="Rose"></button>
                    <button class="color-preset" data-color="#0284c7" style="background:#0284c7" title="Sky"
                        aria-label="Sky"></button>
                    <button class="color-preset" data-color="#16a34a" style="background:#16a34a" title="Green"
                        aria-label="Green"></button>
                    <button class="color-preset" data-color="#ea580c" style="background:#ea580c" title="Orange"
                        aria-label="Orange"></button>
                    <button class="color-preset" data-color="#db2777" style="background:#db2777" title="Pink"
                        aria-label="Pink"></button>
                </div>

                <!-- Custom color wheel -->
                <div class="color-custom-row">
                    <span class="color-custom-label">Custom:</span>
                    <input type="color" id="color-wheel" value="#7c3aed" aria-label="Custom accent color"
                        title="Pick any color" />
                    <span class="color-custom-label" id="color-hex-display">#7c3aed</span>
                </div>

                <!-- Live preview -->
                <div class="theme-preview" id="theme-preview">
                    <div class="preview-dot" id="preview-dot"></div>
                    <span>This is how your accent color looks</span>
                    <div class="preview-accent-bar" id="preview-bar"></div>
                </div>
            </div>
        </div>

        <!-- Save indicator -->
        <div class="save-strip" id="save-strip">
            <span class="save-dot"></span>
            Settings saved
        </div>
    </main>

    <!-- Dock -->
    <nav id="app-dock" aria-label="Navigation">
        <a class="dock-item" href="index.html" data-label="Home" aria-label="Home" title="Home">
            <svg viewBox="0 0 24 24">
                <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z" />
                <polyline points="9 21 9 12 15 12 15 21" />
            </svg>
        </a>
        <div class="dock-separator"></div>
        <a class="dock-item" href="stats.html" data-label="Stats" aria-label="Stats" title="Stats">
            <svg viewBox="0 0 24 24">
                <rect x="3" y="12" width="4" height="9" rx="1" />
                <rect x="10" y="7" width="4" height="14" rx="1" />
                <rect x="17" y="3" width="4" height="18" rx="1" />
            </svg>
        </a>
        <a class="dock-item active" href="settings.html" data-label="Settings" aria-label="Settings" title="Settings">
            <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="3" />
                <path
                    d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
            </svg>
        </a>
    </nav>

    <script>
        // ── Theme helpers ────────────────────────────────────────────
        const PRESETS = ['#7c3aed', '#0891b2', '#d97706', '#e11d48', '#0284c7', '#16a34a', '#ea580c', '#db2777'];

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return { r, g, b };
        }

        function lightenHex(hex, amount = 0.6) {
            const { r, g, b } = hexToRgb(hex);
            const lr = Math.round(r + (255 - r) * amount);
            const lg = Math.round(g + (255 - g) * amount);
            const lb = Math.round(b + (255 - b) * amount);
            return `#${lr.toString(16).padStart(2, '0')}${lg.toString(16).padStart(2, '0')}${lb.toString(16).padStart(2, '0')}`;
        }

        function applyColor(hex) {
            const { r, g, b } = hexToRgb(hex);
            const light = lightenHex(hex, 0.55);
            document.documentElement.style.setProperty('--accent', hex);
            document.documentElement.style.setProperty('--accent-glow', `rgba(${r},${g},${b},0.35)`);
            document.documentElement.style.setProperty('--accent-light', light);

            // Update preview
            document.getElementById('preview-dot').style.background = hex;
            document.getElementById('preview-dot').style.boxShadow = `0 0 12px rgba(${r},${g},${b},0.5)`;
            document.getElementById('preview-bar').style.background = hex;
            document.getElementById('color-hex-display').textContent = hex;
            document.getElementById('color-wheel').value = hex;

            // Update active preset
            document.querySelectorAll('.color-preset').forEach(p => {
                p.classList.toggle('active', p.dataset.color.toLowerCase() === hex.toLowerCase());
            });
        }

        function applyMode(mode) {
            document.documentElement.setAttribute('data-mode', mode);
            document.getElementById('mode-dark').classList.toggle('active', mode === 'dark');
            document.getElementById('mode-light').classList.toggle('active', mode === 'light');
        }

        function saveAndShow() {
            const color = document.documentElement.style.getPropertyValue('--accent').trim() || '#7c3aed';
            const mode = document.documentElement.getAttribute('data-mode') || 'dark';
            localStorage.setItem('trackd-accent', color);
            localStorage.setItem('trackd-mode', mode);
            const strip = document.getElementById('save-strip');
            strip.classList.add('visible');
            clearTimeout(strip._t);
            strip._t = setTimeout(() => strip.classList.remove('visible'), 2000);
        }

        // ── Load saved settings ──────────────────────────────────────
        const savedColor = localStorage.getItem('trackd-accent') || '#7c3aed';
        const savedMode = localStorage.getItem('trackd-mode') || 'dark';
        applyMode(savedMode);
        applyColor(savedColor);

        // ── Event listeners ──────────────────────────────────────────
        document.getElementById('mode-dark').addEventListener('click', () => { applyMode('dark'); saveAndShow(); });
        document.getElementById('mode-light').addEventListener('click', () => { applyMode('light'); saveAndShow(); });

        document.querySelectorAll('.color-preset').forEach(btn => {
            btn.addEventListener('click', () => { applyColor(btn.dataset.color); saveAndShow(); });
        });

        document.getElementById('color-wheel').addEventListener('input', e => {
            applyColor(e.target.value);
            saveAndShow();
        });
    </script>
</body>

</html>
